version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tecrubelerim_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tecrubelerim
      POSTGRES_PASSWORD: dev_password_change_in_prod
      POSTGRES_DB: tecrubelerim_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tecrubelerim -d tecrubelerim_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tecrubelerim_network

  redis:
    image: redis:7-alpine
    container_name: tecrubelerim_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass dev_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tecrubelerim_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tecrubelerim_network:
    driver: bridge
